name: Daily Trends Monitoring

on:
  schedule:
    # Runs at 06:00 UTC every day (Approx midnight in Guatemala)
    - cron: '0 6 * * *'
  workflow_dispatch: # Allows manual triggering

jobs:
  monitor:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install system dependencies (for WeasyPrint)
      run: |
        sudo apt-get update
        sudo apt-get install -y libcairo2 libpango-1.0-0 libpangocairo-1.0-0 libgdk-pixbuf2.0-0 libffi-dev shared-mime-info

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Clean old reports
      run: |
        rm -f outputs/*.pdf
        rm -f outputs/*.md
        rm -f outputs/*.html
        rm -f outputs/charts/*.png

    - name: Fetch Trends
      run: python scripts/fetch_trends.py

    - name: Visualize Trends
      run: python scripts/visualize.py

    - name: Build Report (Markdown)
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      run: python scripts/build_report.py

    - name: Generate PDF
      run: python scripts/md_to_pdf.py

    - name: Upload PDF Report
      uses: actions/upload-artifact@v4
      with:
        name: trends-report
        path: outputs/*.pdf

    - name: Send Email Report
      uses: dawidd6/action-send-mail@v3
      with:
        server_address: smtp.gmail.com
        server_port: 465
        username: ${{ secrets.MAIL_USERNAME }}
        password: ${{ secrets.MAIL_PASSWORD }}
        subject: "🇬🇹 Reporte de Tendencias Políticas - ${{ github.event.repository.updated_at }}"
        to: ramonzamora89@gmail.com
        from: Trends Monitor Bot
        body: |
          Hola Ramon,
          
          Se ha generado el reporte automatizado de tendencias políticas para Guatemala. 
          Adjunto encontrarás el PDF con el análisis y las noticias destacadas.
          
          Saludos,
          Tu bot de monitoreo.
        attachments: outputs/*.pdf

    - name: Commit and push changes
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add outputs/ data/
        git commit -m "Auto-update trends report: $(date +'%Y-%m-%d')" || echo "No changes to commit"
        git push
